<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <!-- 身体渐变 -->
    <radialGradient id="bodyGrad" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#303030"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- 肚皮渐变 -->
    <radialGradient id="bellyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
    <!-- 头部渐变 -->
    <radialGradient id="headGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <!-- 嘴巴渐变 -->
    <linearGradient id="beakGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9c33"/>
      <stop offset="100%" stop-color="#e07000"/>
    </linearGradient>
    <!-- 脚渐变 -->
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffaa40"/>
      <stop offset="100%" stop-color="#d47500"/>
    </linearGradient>
    <!-- 杯子渐变 -->
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d8d8d8"/>
    </linearGradient>
    <!-- 咖啡液渐变 -->
    <radialGradient id="coffeeGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7a3b10"/>
      <stop offset="100%" stop-color="#3e1a05"/>
    </radialGradient>
    <!-- 地面阴影 -->
    <radialGradient id="groundShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- 围巾渐变 -->
    <linearGradient id="scarfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="50%" stop-color="#c1121f"/>
      <stop offset="100%" stop-color="#a4161a"/>
    </linearGradient>
    <!-- 蒸汽模糊 -->
    <filter id="steamBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <!-- 整体柔和阴影 -->
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="500" height="600" fill="#e8f0fe" rx="20"/>

  <!-- 地面阴影 -->
  <ellipse cx="220" cy="540" rx="140" ry="25" fill="url(#groundShadow)"/>

  <g filter="url(#softShadow)">
    <!-- ===== 左脚 ===== -->
    <path d="M 140 505 Q 110 510 100 520 Q 95 530 110 535 Q 125 535 140 528 Q 155 535 170 535 Q 185 530 180 520 Q 170 510 140 505 Z"
          fill="url(#footGrad)" stroke="#b56500" stroke-width="1.5"/>
    <!-- 脚蹼纹路 -->
    <line x1="125" y1="518" x2="120" y2="530" stroke="#b56500" stroke-width="1" opacity="0.4"/>
    <line x1="155" y1="518" x2="160" y2="530" stroke="#b56500" stroke-width="1" opacity="0.4"/>

    <!-- ===== 右脚 ===== -->
    <path d="M 220 508 Q 195 512 188 522 Q 183 532 195 536 Q 210 536 222 530 Q 235 536 248 536 Q 262 532 258 522 Q 250 512 220 508 Z"
          fill="url(#footGrad)" stroke="#b56500" stroke-width="1.5"/>
    <line x1="210" y1="522" x2="205" y2="533" stroke="#b56500" stroke-width="1" opacity="0.4"/>
    <line x1="240" y1="522" x2="245" y2="533" stroke="#b56500" stroke-width="1" opacity="0.4"/>

    <!-- ===== 身体 ===== -->
    <ellipse cx="210" cy="370" rx="105" ry="140" fill="url(#bodyGrad)"/>

    <!-- ===== 肚皮 ===== -->
    <ellipse cx="218" cy="380" rx="70" ry="110" fill="url(#bellyGrad)"/>

    <!-- ===== 尾巴 ===== -->
    <path d="M 108 440 Q 75 455 70 475 Q 68 490 85 485 Q 100 478 115 460 Z"
          fill="#1a1a1a" stroke="#0a0a0a" stroke-width="1"/>

    <!-- ===== 左翅膀 ===== -->
    <path d="M 110 280 Q 60 320 55 390 Q 55 440 80 450 Q 100 455 110 430 Q 118 400 112 340 Z"
          fill="url(#bodyGrad)" stroke="#0a0a0a" stroke-width="1"/>
    <!-- 翅膀内侧高光 -->
    <path d="M 112 300 Q 75 335 72 385 Q 72 425 88 435 Q 98 438 105 418 Q 110 395 108 345 Z"
          fill="#252525" opacity="0.6"/>

    <!-- ===== 右翅膀（向前伸出拿杯子） ===== -->
    <path d="M 305 280 Q 350 300 360 350 Q 365 395 345 410 Q 325 420 310 400 Q 298 375 302 330 Z"
          fill="url(#bodyGrad)" stroke="#0a0a0a" stroke-width="1"/>
    <path d="M 307 300 Q 340 315 348 355 Q 352 388 338 400 Q 325 408 315 393 Q 305 372 306 340 Z"
          fill="#252525" opacity="0.6"/>
  </g>

  <!-- ===== 咖啡杯 ===== -->
  <g>
    <!-- 杯子阴影 -->
    <ellipse cx="375" cy="420" rx="40" ry="10" fill="rgba(0,0,0,0.15)"/>
    
    <!-- 杯身 -->
    <path d="M 330 345 L 340 420 Q 342 435 375 438 Q 408 435 410 420 L 420 345 Z"
          fill="url(#cupGrad)" stroke="#bbb" stroke-width="1.5"/>
    <!-- 杯身阴影（右侧暗面） -->
    <path d="M 395 345 L 405 420 Q 408 435 375 438 Q 395 432 398 418 L 410 345 Z"
          fill="rgba(0,0,0,0.08)"/>
    <!-- 杯身高光线 -->
    <path d="M 340 350 L 348 418" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- 咖啡液面 -->
    <ellipse cx="375" cy="350" rx="44" ry="10" fill="url(#coffeeGrad)"/>
    <!-- 咖啡液面高光 -->
    <ellipse cx="365" cy="348" rx="15" ry="4" fill="rgba(255,255,255,0.15)"/>
    
    <!-- 杯口 -->
    <ellipse cx="375" cy="345" rx="46" ry="11" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5"/>
    <ellipse cx="375" cy="345" rx="44" ry="10" fill="url(#coffeeGrad)"/>
    
    <!-- 杯子把手 -->
    <path d="M 420 360 Q 455 358 458 390 Q 460 420 430 420"
          fill="none" stroke="#ccc" stroke-width="10" stroke-linecap="round"/>
    <path d="M 420 360 Q 450 360 452 390 Q 454 415 430 418"
          fill="none" stroke="#f0f0f0" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- ===== 蒸汽 ===== -->
  <g filter="url(#steamBlur)">
    <path d="M 360 330 Q 352 310 362 290 Q 372 270 362 250"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round">
      <animate attributeName="d"
               values="M 360 330 Q 352 310 362 290 Q 372 270 362 250;
                       M 360 330 Q 370 310 360 290 Q 350 270 360 250;
                       M 360 330 Q 352 310 362 290 Q 372 270 362 250"
               dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 380 325 Q 388 305 378 285 Q 368 265 378 245"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3.5" stroke-linecap="round">
      <animate attributeName="d"
               values="M 380 325 Q 388 305 378 285 Q 368 265 378 245;
                       M 380 325 Q 370 305 380 285 Q 390 265 380 245;
                       M 380 325 Q 388 305 378 285 Q 368 265 378 245"
               dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M 395 328 Q 402 312 394 295 Q 386 278 395 262"
          fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d"
               values="M 395 328 Q 402 312 394 295 Q 386 278 395 262;
                       M 395 328 Q 386 312 394 295 Q 402 278 395 262;
                       M 395 328 Q 402 312 394 295 Q 386 278 395 262"
               dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#softShadow)">
    <!-- ===== 头部 ===== -->
    <ellipse cx="210" cy="200" rx="80" ry="75" fill="url(#headGrad)"/>

    <!-- ===== 白色面部 ===== -->
    <!-- 左眼眶白色区域 -->
    <ellipse cx="185" cy="195" rx="38" ry="35" fill="#f8f8f8"/>
    <!-- 右眼眶白色区域 -->
    <ellipse cx="240" cy="195" rx="38" ry="35" fill="#f8f8f8"/>

    <!-- ===== 眼睛 ===== -->
    <!-- 左眼 -->
    <ellipse cx="182" cy="192" rx="16" ry="18" fill="#ffffff" stroke="#333" stroke-width="1"/>
    <ellipse cx="186" cy="194" rx="9" ry="10" fill="#1a1a1a"/>
    <circle cx="189" cy="189" r="4" fill="#ffffff"/>
    <circle cx="184" cy="197" r="2" fill="#ffffff" opacity="0.5"/>
    
    <!-- 右眼（微微眯着，享受咖啡） -->
    <ellipse cx="242" cy="192" rx="16" ry="15" fill="#ffffff" stroke="#333" stroke-width="1"/>
    <ellipse cx="246" cy="194" rx="9" ry="8" fill="#1a1a1a"/>
    <circle cx="249" cy="190" r="3.5" fill="#ffffff"/>
    <!-- 眯眼效果线 -->
    <path d="M 228 180 Q 242 174 258 180" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

    <!-- ===== 嘴巴 ===== -->
    <!-- 上嘴 -->
    <path d="M 185 218 L 215 232 L 245 218 Q 215 225 185 218 Z"
          fill="url(#beakGrad)" stroke="#b56500" stroke-width="1"/>
    <!-- 下嘴 -->
    <path d="M 190 222 L 215 240 L 240 222 Q 215 228 190 222 Z"
          fill="#e07000" stroke="#b56500" stroke-width="1"/>
    <!-- 嘴巴中线 -->
    <line x1="188" y1="220" x2="242" y2="220" stroke="#b56500" stroke-width="0.8" opacity="0.5"/>
    <!-- 嘴部高光 -->
    <path d="M 200 219 Q 215 215 225 219" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

    <!-- ===== 腮红 ===== -->
    <ellipse cx="155" cy="215" rx="14" ry="9" fill="#ffb3b3" opacity="0.45"/>
    <ellipse cx="270" cy="215" rx="14" ry="9" fill="#ffb3b3" opacity="0.45"/>
  </g>

  <!-- ===== 围巾 ===== -->
  <g>
    <!-- 围巾主体 -->
    <path d="M 125 260 Q 210 248 310 260 Q 315 275 310 290 Q 210 278 125 290 Q 120 275 125 260 Z"
          fill="url(#scarfGrad)" stroke="#8b0000" stroke-width="1"/>
    <!-- 围巾褶皱 -->
    <path d="M 160 262 Q 165 275 162 288" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
    <path d="M 260 262 Q 265 275 262 288" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
    <!-- 围巾高光 -->
    <path d="M 130 264 Q 210 254 300 264" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    
    <!-- 围巾尾巴（左侧垂下） -->
    <path d="M 135 280 Q 120 310 125 360 Q 128 370 140 368 Q 148 365 145 355 Q 142 320 150 285 Z"
          fill="#c1121f" stroke="#8b0000" stroke-width="1"/>
    <path d="M 138 290 Q 128 315 132 350" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    
    <!-- 围巾尾巴末端 -->
    <path d="M 120 355 Q 115 365 125 372 Q 135 375 140 368" fill="#a4161a" stroke="#8b0000" stroke-width="1"/>
  </g>

  <!-- ===== 头顶高光 ===== -->
  <ellipse cx="185" cy="135" rx="30" ry="12" fill="rgba(255,255,255,0.06)" transform="rotate(-15, 185, 135)"/>

</svg>
