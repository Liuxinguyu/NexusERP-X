server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
  production: false

spring:
  application:
    name: nexus-erp
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3306/nexus_dev?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          username: root
          password: ""
          driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: del_flag
      logic-not-delete-value: 0
      logic-delete-value: 1

nexus:
  tenant:
    default-tenant-id: 1
    default-shop-id: 1
    default-org-id: 1
  security:
    local-dev-permit-all-api: false
    jwt:
      # 【安全警告】生产环境必须修改为随机密钥（32+字符），通过环境变量覆盖
      secret: ${JWT_SECRET:nexus-dev-jwt-secret-0123456789abcdef}
      expiration-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info
