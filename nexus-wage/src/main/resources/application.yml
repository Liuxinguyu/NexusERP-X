server:
  port: 8084

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
  production: ${KNIFE4J_PRODUCTION:false}

spring:
  application:
    name: nexus-wage
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://127.0.0.1:3306/nexus_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY:true}
          username: ${DB_USERNAME:root}
          password: ${DB_PASSWORD:}
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: del_flag
      logic-not-delete-value: 0
      logic-delete-value: 1

nexus:
  tenant:
    default-tenant-id: 1
    default-shop-id: 1
    default-org-id: 1
  security:
    local-dev-permit-all-api: false
    jwt:
      # 【安全警告】生产环境必须修改为随机密钥（32+字符），通过环境变量覆盖
      secret: ${JWT_SECRET:nexus-dev-jwt-secret-0123456789abcdef}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false
