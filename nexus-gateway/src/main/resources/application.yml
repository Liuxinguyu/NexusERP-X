server:
  port: 8080

nexus:
  security:
    jwt:
      # 【安全警告】生产环境必须修改为随机密钥（32+字符），通过环境变量覆盖
      secret: ${JWT_SECRET:nexus-dev-jwt-secret-0123456789abcdef}
      expiration-seconds: 604800
      token-prefix: "Bearer "
  tenant:
    default-tenant-id: 1
    default-shop-id: 1
    default-org-id: 1

spring:
  application:
    name: nexus-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - com.baomidou.dynamic.datasource.spring.boot.autoconfigure.DynamicDataSourceAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.jdbc.DataSourceHealthContributorAutoConfiguration
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        ssl:
          use-insecure-trust-manager: false
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://localhost:5176"
              - "http://localhost:5178"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        - id: nexus-system-auth
          order: 0
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: nexus-system-oa-leave
          order: 2
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/oa/leave/**
        - id: nexus-system
          order: 10
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/system/**
        - id: nexus-erp
          order: 10
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/erp/**
        - id: nexus-oa
          order: 10
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/oa/**
        - id: nexus-wage
          order: 10
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/wage/**

# 仅暴露 health、info；网关 AuthenticationGlobalFilter 的 actuator 白名单须与此一致，
# 勿在代码中放行 /actuator/** 通配，以免新增 actuator 端点时被动对外暴露。
management:
  endpoints:
    web:
      exposure:
        include: health,info
