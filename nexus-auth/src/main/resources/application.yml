server:
  port: 8085

spring:
  application:
    name: nexus-auth
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

nexus:
  tenant:
    default-tenant-id: 1
    default-shop-id: 1
    default-org-id: 1
  security:
    local-dev-permit-all-api: false
    jwt:
      # 【安全警告】生产环境必须修改为随机密钥（32+字符），通过环境变量覆盖
      secret: ${JWT_SECRET:nexus-dev-jwt-secret-0123456789abcdef}
      expiration-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    db:
      enabled: false
    redis:
      enabled: false
